name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Build release
        run: cargo build --workspace --release
      - name: Test (serial)
        run: cargo test --workspace --release -- --test-threads=1
      - name: Core crate warning-free
        run: RUSTFLAGS="-Dwarnings" cargo check -p openntpd-rs-core -p openntpd-rs-io -p openntpd-rs-d
      - name: Freshness gate
        run: cargo xtask check
      - name: No-orig gate
        run: cargo xtask no-orig
      - name: Self-test oracle
        run: cargo xtask parity --skip-oracle

  cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Check cross-compilation
        run: cargo check --target ${{ matrix.target }} -p openntpd-rs-core -p openntpd-rs-io

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (core crates)
        run: cargo clippy -p openntpd-rs-core -p openntpd-rs-io -p openntpd-rs-d -- -D warnings

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri test
        run: cargo miri test -p openntpd-rs-core -- --test-threads=1

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Security audit
        run: cargo audit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Generate docs
        run: cargo doc --workspace --no-deps
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc
